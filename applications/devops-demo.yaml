apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-demo
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/mirkhan92/devops-demo-gitops.git
    targetRevision: HEAD
    path: helm

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
